<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <link rel="icon" type="image/x-icon" href="https://upload-os-bbs.hoyolab.com/upload/2022/06/13/100427891/51296d07ef153ca7dd744dc31874d548_4734072724131588175.png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personajes - Agentes de Zenless Zone Zero</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link href="../Estilos/Base.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="Cabecera">
        <header>
            <nav class="navbar navbar-expand-lg" data-bs-theme="dark">
                <div class="container-fluid">
                    <a class="navbar-brand fw-bold" href="../Index.html">ZZZ Wiki</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <div class="navbar-nav">
                            <a class="nav-link" href="facciones.html">Facciones</a>
                            <a class="nav-link active" aria-current="page" href="personajes.html">Agentes</a>
                            <a class="nav-link" href="noticias.html">Noticias</a>
                        </div>
                    </div>
                </div>
            </nav>
        </header>
    </div>

    <div class="container mt-5">
      <h1 class="mb-4">Agentes</h1>

      <!-- FILTROS -->
      <div class="mb-4 d-flex flex-wrap gap-2 align-items-center">
        <div class="me-3">
          <span class="fw-bold small text-muted me-2">ATRIBUTO</span>
          <div class="btn-group flex-wrap" role="group" id="filtro-atributo">
            <button class="btn btn-sm btn-outline-secondary active" data-filtro="atributo" data-valor="">Todos</button>
            <button class="btn btn-sm btn-outline-warning"   data-filtro="atributo" data-valor="Electrico">⚡ Eléctrico</button>
            <button class="btn btn-sm btn-outline-success"   data-filtro="atributo" data-valor="Eter">✨ Éter</button>
            <button class="btn btn-sm btn-outline-secondary" data-filtro="atributo" data-valor="Fisico">👊 Físico</button>
            <button class="btn btn-sm btn-outline-danger"    data-filtro="atributo" data-valor="Fuego">🔥 Fuego</button>
            <button class="btn btn-sm btn-outline-info"      data-filtro="atributo" data-valor="Hielo">❄️ Hielo</button>
          </div>
        </div>
        <div>
          <span class="fw-bold small text-muted me-2">ROL</span>
          <div class="btn-group flex-wrap" role="group" id="filtro-rol">
            <button class="btn btn-sm btn-outline-secondary active" data-filtro="rol" data-valor="">Todos</button>
            <button class="btn btn-sm btn-outline-dark" data-filtro="rol" data-valor="Atacante">⚔️ Atacante</button>
            <button class="btn btn-sm btn-outline-dark" data-filtro="rol" data-valor="Anomalo">☣️ Anómalo</button>
            <button class="btn btn-sm btn-outline-dark" data-filtro="rol" data-valor="Aturdidor">💫 Aturdidor</button>
            <button class="btn btn-sm btn-outline-dark" data-filtro="rol" data-valor="Auxiliar">💚 Auxiliar</button>
            <button class="btn btn-sm btn-outline-dark" data-filtro="rol" data-valor="Defensor">🛡️ Defensor</button>
          </div>
        </div>
        <div class="ms-auto">
          <span class="badge bg-secondary" id="conteo-agentes">0 agentes</span>
        </div>
      </div>

      <!-- CONTENEDOR DE CARDS - generado dinámicamente por personajes.js -->
      <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4" id="contenedor-agentes">
        <!-- Las cards se insertan aquí via JavaScript (class Agente -> generarCard()) -->
      </div>

    </div>

    <!-- FOOTER -->
    <footer class="container text-center mt-5">
        <p class="mb-1 text-muted">&copy; 2026 Zenless Zone Zero Wiki - Proyecto Académico</p>
        <div class="social-links">
            <a href="#" class="text-decoration-none me-2">Política de Privacidad</a> |
            <a href="#" class="text-decoration-none ms-2">Contacto</a>
        </div>
    </footer>

    <!-- MODAL de detalles del agente -->
    <div class="modal fade" id="agenteModal" tabindex="-1" aria-labelledby="agenteModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white border-bottom-0">
                    <h5 class="modal-title fw-bold" id="modalNombre">Nombre del Agente</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <ul class="nav nav-tabs nav-fill bg-light" id="agenteTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active fw-bold text-dark" id="perfil-tab" data-bs-toggle="tab" data-bs-target="#perfil" type="button" role="tab">Perfil</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold text-dark" id="builds-tab" data-bs-toggle="tab" data-bs-target="#builds" type="button" role="tab">Mejores Builds</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold text-dark" id="equipos-tab" data-bs-toggle="tab" data-bs-target="#equipos" type="button" role="tab">Equipos</button>
                        </li>
                    </ul>
                    <div class="tab-pane fade show active text-center" id="perfil" role="tabpanel">
    <div class="agente-imagen-wrapper mb-3" id="modalImagenWrapper">
        <img id="modalImagen" src="" alt="Agente" class="agente-imagen-modal">
    </div>
    <h6 class="text-muted mb-3">
                                <span id="modalAtributo"></span> | <span id="modalRol"></span>
                            </h6>
                            <p id="modalDescripcion" class="small"></p>
                        </div>
                        <div class="tab-pane fade" id="builds" role="tabpanel">
                            <div class="card border-warning mb-3 shadow-sm">
                                <div class="card-header bg-warning text-dark fw-bold">Build Recomendada (Premium)</div>
                                <div class="card-body">
                                    <p id="modalBuildPremium" class="card-text small mb-0"></p>
                                </div>
                            </div>
                            <div class="card border-info shadow-sm">
                                <div class="card-header bg-info text-white fw-bold">Build F2P (Accesible)</div>
                                <div class="card-body">
                                    <p id="modalBuildF2P" class="card-text small mb-0"></p>
                                </div>
                            </div>
                        </div>
                        <div class="tab-pane fade" id="equipos" role="tabpanel">
                            <div class="bg-light p-3 rounded border">
                                <h6 class="fw-bold">
                                    <span class="material-symbols-outlined align-middle me-1">group</span>
                                    Sinergia Recomendada
                                </h6>
                                <p id="modalSinergia" class="small text-muted mb-0"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/personajes.js"></script>
  </body>
</html>
